name: CI

on:
  push:
    branches: [master, claude/**]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: 📥 Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: 🔍 Determine base branch
        id: base
        shell: bash
        run: |
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="${{ github.event.repository.default_branch }}"
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "Using base ref: $BASE_REF"

      - name: 🔍 Run Ruff linting
        shell: bash
        run: |
          BASE_REF="${{ steps.base.outputs.base_ref }}"
          git fetch origin "$BASE_REF"
          files=$(git diff --name-only "origin/$BASE_REF...HEAD" -- '*.py')
          if [ -z "$files" ]; then
            echo "No Python files changed; skipping ruff."
          else
            echo "$files" | xargs ruff check --output-format=github
          fi

      - name: 🎨 Check code formatting with Black
        shell: bash
        run: |
          BASE_REF="${{ steps.base.outputs.base_ref }}"
          git fetch origin "$BASE_REF"
          files=$(git diff --name-only "origin/$BASE_REF...HEAD" -- '*.py')
          if [ -z "$files" ]; then
            echo "No Python files changed; skipping black."
          else
            echo "$files" | xargs black --check --diff
          fi

      - name: 🧾 Compile check (syntax)
        run: |
          python -m compileall -q rex scripts

  tests:
    name: Python Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🧹 Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost
          sudo apt-get clean
          pip cache purge || true

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 🧰 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libsndfile1 \
            libasound2-dev \
            portaudio19-dev

      - name: 📥 Install Python dependencies (CPU-only)
        run: |
          python -m pip install --upgrade "pip>=25.3" "setuptools>=78.1.1" wheel
          pip install -e ".[dev]"

      - name: 🧪 Run tests with coverage
        run: |
          pytest -m "not slow and not audio and not gpu" --cov=rex --cov-report=term-missing --cov-report=html --cov-report=xml
        env:
          REX_FILE_LOGGING_ENABLED: "false"

      - name: 📤 Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml
            htmlcov/




